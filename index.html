<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>苹果自定义短语特殊符号生成器</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">Apple 自定义短语</p>
        <h1>特殊符号 plist 生成器</h1>
        <p class="intro">按分类挑选常用符号、单位、数学符号、箭头和希腊字母，自动生成适合苹果输入法导入的自定义短语 plist。</p>
      </div>
      <div class="hero-card">
        <label class="field">
          <span>快捷码前缀</span>
          <input id="prefixInput" type="text" value="u" maxlength="6" autocomplete="off" spellcheck="false">
          <p class="help">例如，σ叫作sigma，但是这可能导致在输英语时触发快捷码，因此我们建议使用 "u" 或 "a" 开头，例如 σ 就是"usigma"。</p>
        </label>
        <label class="field">
          <span>下载文件名</span>
          <input id="filenameInput" type="text" value="apple-symbols.plist" autocomplete="off" spellcheck="false">
        </label>
        <button id="downloadButton" class="primary">生成并下载 plist</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <div class="toolbar">
          <div id="tabs" class="tabs" aria-label="分类标签"></div>
          <div class="toolbar-actions">
            <label class="search">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="搜索符号、名称或快捷码" autocomplete="off" spellcheck="false">
            </label>
            <button id="selectVisibleButton" class="ghost">全选当前视图</button>
            <button id="clearVisibleButton" class="ghost">取消当前视图</button>
          </div>
        </div>
        <div id="grid" class="symbol-grid"></div>
      </section>

      <aside class="panel sidebar">
        <div class="summary">
          <div>
            <p class="summary-label">已选条目</p>
            <p id="selectedCount" class="summary-value">0</p>
          </div>
          <div>
            <p class="summary-label">当前前缀</p>
            <p id="prefixPreview" class="summary-value">u</p>
          </div>
        </div>

        <div class="selected-panel">
          <div class="section-head">
            <h2>已选清单</h2>
            <button id="clearAllButton" class="text-button">全部清空</button>
          </div>
          <div id="selectedList" class="selected-list empty">还没有选择任何条目。</div>
        </div>

        <div class="preview-panel">
          <div class="section-head">
            <h2>plist 预览</h2>
            <button id="copyButton" class="text-button">复制内容</button>
          </div>
          <textarea id="previewOutput" readonly spellcheck="false"></textarea>
        </div>
      </aside>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
